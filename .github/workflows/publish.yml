name: Publish to Modrinth and GitHub Releases

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build project
        run: pwsh ./build.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: target/*.jar

  publish-modrinth:
    runs-on: ubuntu-latest
    needs: build
    if: "!endsWith(github.ref_name, '.0')"
    # Only publish to Modrinth for minor/major versions (not patch like v1.0.1)

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin
          path: plugin

      - name: Find JAR file
        id: findjar
        shell: bash
        run: |
          cd plugin
          echo "jar=$(ls *.jar | head -1)" >> $GITHUB_OUTPUT
      
      - name: Upload to Modrinth
        uses: RubixDev/modrinth-upload@v1
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          file_path: plugin/${{ steps.findjar.outputs.jar }}
          name: ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          changelog: ""
          relations: ""
          game_versions: 1.21.11
          release_type: release
          loaders: paper
          featured: false
          project_id: ${{ secrets.MODRINTH_SLUG }}
          staging: false
          new_project_body: ""


                



  github-release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin
          path: plugin

      - name: Find JAR file
        id: findjar
        run: echo "jar=$(ls plugin/*.jar)" >> $GITHUB_OUTPUT

      - name: Delete existing release (if any)
        uses: dev-drprasad/delete-tag-and-release@v1.0
        with:
          tag_name: ${{ github.ref_name }}
          delete_release: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            ${{ steps.findjar.outputs.jar }}
